    adr: docs/architecture/adr-0003-texture-loading-cache-and-web-fallback-strategy.md
    method_signature: "get_texture_or_request(item_id: String, resolution: int, callback: Callable) -> void"
    interface: "HOT/WARM hits may invoke callback synchronously; failures, invalid requests, shared cancels, and evictions use callback(null)."
    referenced_by:
      - docs/architecture/adr-0003-texture-loading-cache-and-web-fallback-strategy.md
    added: 2026-06-18
    revised: ""

  - contract: texture_shared_cancel
