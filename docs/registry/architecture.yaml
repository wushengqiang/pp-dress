    adr: docs/architecture/adr-0002-persistence-ownership-and-save-rollback-strategy.md
    signal_signature: "day_completed(day: int), items_unlocked(item_ids: Array[String]), day_started(day: int)"
    interface: "ProgressManager emits progress signals only after SaveManager.save() succeeds."
    referenced_by:
      - docs/architecture/adr-0002-persistence-ownership-and-save-rollback-strategy.md
    added: 2026-06-18
    revised: ""

  - contract: texture_request_callback
    status: active
    pattern: direct_call
    producer: TextureCache
