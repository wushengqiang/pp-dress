# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: boot_readiness_checks
    status: active
    pattern: direct_call
    producer: Foundation/Core Autoloads
    consumers:
      - GameState
    adr: docs/architecture/adr-0001-autoload-order-and-boot-orchestration.md
    interface: "Startup-gated Autoloads expose is_ready: bool and load_error: String; GameState checks them during deferred BOOT."
    referenced_by:
      - docs/architecture/adr-0001-autoload-order-and-boot-orchestration.md
      - docs/architecture/adr-0004-scene-transition-and-state-machine-contract.md
    added: 2026-06-18
    revised: ""

  - contract: scene_transition_readiness
    status: active
    pattern: direct_call
    producer: Destination scene
    consumers:
      - GameState
    adr: docs/architecture/adr-0001-autoload-order-and-boot-orchestration.md
    method_signature: "GameState._on_scene_ready(scene_state: State) -> void"
    referenced_by:
      - docs/architecture/adr-0001-autoload-order-and-boot-orchestration.md
      - docs/architecture/adr-0004-scene-transition-and-state-machine-contract.md
    added: 2026-06-18
    revised: ""

  - contract: save_progress_field_writes
    status: active
    pattern: direct_call
    producer: ProgressManager
