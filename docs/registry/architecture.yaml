# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: scene_transition
    status: active
    api: "SceneTree.change_scene_to_file()"
    confirmation: "Destination scene must call GameState._on_scene_ready(scene_state) before GameState emits state_changed."
    adr: docs/architecture/adr-0001-autoload-order-and-boot-orchestration.md
    reason: "Godot scene changes are timing-sensitive; state_changed must wait for destination scene readiness."
    referenced_by:
      - docs/architecture/adr-0001-autoload-order-and-boot-orchestration.md
      - docs/architecture/adr-0004-scene-transition-and-state-machine-contract.md
    added: 2026-06-18
    revised: ""

  - purpose: texture_async_loading
    status: active
    api: "ResourceLoader.load_threaded_request() + load_threaded_get_status() + load_threaded_get()"
    confirmation: "Cold runtime texture loads use threaded loading with bounded polling; synchronous runtime PNG loading is not the fallback path."
    adr: docs/architecture/adr-0003-texture-loading-cache-and-web-fallback-strategy.md
    reason: "Threaded loading was verified by the resource-loader spike and avoids frame-sensitive cold-load stalls."
    referenced_by:
      - docs/architecture/adr-0003-texture-loading-cache-and-web-fallback-strategy.md
    added: 2026-06-18
    revised: ""

  - purpose: texture_web_hosting
    status: active
    api: "HTTP/HTTPS served Godot Web export"
    confirmation: "Texture loading Web smoke/prod validation must serve exported builds over HTTP/HTTPS; file:// is not a valid runtime path."
    adr: docs/architecture/adr-0003-texture-loading-cache-and-web-fallback-strategy.md
    reason: "The resource-loader spike confirmed file:// fails before game startup because browsers block .pck fetches from origin null."
    referenced_by:
      - docs/architecture/adr-0003-texture-loading-cache-and-web-fallback-strategy.md
    added: 2026-06-18
    revised: ""

  - purpose: standard_ui_input
    status: active
    api: "Godot native Control.gui_input() / Button.pressed / ScrollContainer paths"
    confirmation: "Standard buttons, dialogue controls, main menu/goodnight controls, and normal scrolling must not route the same business action through InputManager.clicked."
    adr: docs/architecture/adr-0005-input-gesture-ownership-and-ui-focus-model.md
    reason: "Native GUI ownership prevents double-triggered UI actions and keeps ordinary Control behavior idiomatic in Godot 4.6."
    referenced_by:
      - docs/architecture/adr-0005-input-gesture-ownership-and-ui-focus-model.md
    added: 2026-06-18
    revised: ""

  - purpose: active_drag_event_propagation
    status: active
    api: "Viewport.set_input_as_handled() via InputManager.mark_input_handled()"
    confirmation: "Only active drag events call mark_input_handled(); this controls Godot event propagation but does not guarantee browser DOM default behavior suppression."
    adr: docs/architecture/adr-0005-input-gesture-ownership-and-ui-focus-model.md
    reason: "Active drag ownership needs a testable Godot propagation boundary while Web canvas default behavior remains a separate export-template validation concern."
    referenced_by:
      - docs/architecture/adr-0005-input-gesture-ownership-and-ui-focus-model.md
    added: 2026-06-18
    revised: ""

