# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: autoload_ready_mutual_calls
    status: active
    description: "Autoloads must not solve startup dependencies by mutually calling each other from _ready()."
    why: "Mutual _ready() call chains make startup order fragile and can reintroduce same-frame dependency races."
    adr: docs/architecture/adr-0001-autoload-order-and-boot-orchestration.md
    added: 2026-06-18

  - pattern: state_changed_before_scene_ready
    status: active
    description: "GameState must not emit state_changed immediately after change_scene_to_file(); destination scene readiness must be confirmed first."
    why: "Destination scenes may not have completed minimal safe initialization immediately after a scene change request."
    adr: docs/architecture/adr-0001-autoload-order-and-boot-orchestration.md
    added: 2026-06-18

  - pattern: save_manager_interprets_progress_rules
    status: active
    description: "SaveManager must not clamp days, compute unlocks, repair progression semantics, or decide which day is playable."
    why: "Persistence is a data pipe; progression rules belong to ProgressManager."
    adr: docs/architecture/adr-0002-persistence-ownership-and-save-rollback-strategy.md
    added: 2026-06-18

  - pattern: ui_direct_save_progress_write
    status: active
    description: "UI and feature systems must not directly call SaveManager progress-field setters."
    why: "Direct writes bypass ProgressManager authority and can create stale unlock caches or unreviewed progress commits."
    adr: docs/architecture/adr-0002-persistence-ownership-and-save-rollback-strategy.md
    added: 2026-06-18

  - pattern: progress_signal_before_persistence
    status: active
    description: "ProgressManager must not emit day_completed, items_unlocked, or day_started before SaveManager.save() succeeds."
    why: "Players must not see progress that was not safely persisted."
    adr: docs/architecture/adr-0002-persistence-ownership-and-save-rollback-strategy.md
    added: 2026-06-18

  - pattern: goodnight_failure_second_save
    status: active
    description: "GOODNIGHT save-failure handling must not immediately run a second SaveManager.save() after rollback."
    why: "The previous successful save remains the recovery source; a second failed-path save can overwrite status or create misleading persisted state."
    adr: docs/architecture/adr-0002-persistence-ownership-and-save-rollback-strategy.md
    added: 2026-06-18

  - pattern: resource_loader_autoload_name
    status: active
    description: "The project must not register a Godot Autoload named ResourceLoader."
    why: "That name shadows Godot's built-in ResourceLoader class and can make core loading APIs unavailable or ambiguous."
    adr: docs/architecture/adr-0003-texture-loading-cache-and-web-fallback-strategy.md
    added: 2026-06-18

  - pattern: resource_loader_remove_resource_from_cache
    status: active
    description: "Runtime code must not call ResourceLoader.remove_resource_from_cache()."
    why: "The resource-loader spike verified this GDScript API does not exist in Godot 4.6; texture lifecycle uses project-held reference release and cache modes instead."
    adr: docs/architecture/adr-0003-texture-loading-cache-and-web-fallback-strategy.md
    added: 2026-06-18

  - pattern: per_frame_sync_texture_load_fallback
    status: active
    description: "Runtime cold texture fallback must not use per-frame synchronous ResourceLoader.load() for PNG/FULL texture paths."
    why: "Synchronous cold loads can stall wardrobe and outfit frames; approved fallbacks reduce memory pressure or cache counts instead."
    adr: docs/architecture/adr-0003-texture-loading-cache-and-web-fallback-strategy.md
    added: 2026-06-18

  - pattern: instance_level_shared_texture_cancel
    status: active
    description: "A single Character/UI instance must not call TextureCache.cancel_request() merely because that instance no longer needs the texture."
    why: "cancel_request() is a shared texture-level cancel and notifies all waiters; instance lifecycle cancellation must use local token/generation discard."
    adr: docs/architecture/adr-0003-texture-loading-cache-and-web-fallback-strategy.md
    added: 2026-06-18

  - pattern: direct_scene_change_outside_gamestate
    status: active
    description: "UI, feature systems, and routable scenes must not call SceneTree.change_scene_to_file() directly for global game-state transitions."
    why: "Direct scene changes bypass GameState's transition table, readiness handshake, context ownership, timeout, and GOODNIGHT persistence guards."
    adr: docs/architecture/adr-0004-scene-transition-and-state-machine-contract.md
    added: 2026-06-18

  - pattern: success_state_emit_without_committed_transition
    status: active
    description: "GameState must not emit success state_changed signals for illegal requests, transition timeouts, mismatched scene readiness callbacks, or failed GOODNIGHT commits."
    why: "Downstream scenes and UI rely on state_changed as proof that the transition is committed and safe to observe."
    adr: docs/architecture/adr-0004-scene-transition-and-state-machine-contract.md
    added: 2026-06-18

  - pattern: global_inputmanager_gui_click_capture
    status: active
    description: "InputManager must not globally interpret every press/touch as a gameplay click or drag candidate."
    why: "Global capture can double-trigger standard Godot GUI actions and make ScrollContainer/button behavior fight registered gameplay gestures."
    adr: docs/architecture/adr-0005-input-gesture-ownership-and-ui-focus-model.md
    added: 2026-06-18

  - pattern: inputmanager_carries_gameplay_identity
    status: active
    description: "InputManager gesture dictionaries must not contain item_id, Node, Control, Resource, wardrobe item dictionaries, or clothing references."
    why: "The input layer owns gesture streams only; gameplay identity belongs to UI owners such as WardrobeUI."
    adr: docs/architecture/adr-0005-input-gesture-ownership-and-ui-focus-model.md
    added: 2026-06-18

  - pattern: single_visual_focus_state_for_hover_and_keyboard_focus
    status: active
    description: "UI Controls must not collapse mouse/touch hover and keyboard/gamepad focus into one visual state."
    why: "Godot 4.6 separates mouse/touch focus from keyboard/gamepad focus, and both can be visible on different Controls at the same time."
    adr: docs/architecture/adr-0005-input-gesture-ownership-and-ui-focus-model.md
    added: 2026-06-18

  - pattern: ui_optimistic_authoritative_state_update
    status: active
    description: "Presentation/UI must not update authoritative-looking gameplay state, such as equipped outfit display state, before receiving the confirmed gameplay result signal."
    why: "Speculative UI state can show outfits, progress, or transitions that gameplay, persistence, or renderer authority has not confirmed."
    adr: docs/architecture/adr-0006-presentation-to-gameplay-communication-pattern.md
    added: 2026-06-18

  - pattern: gameplay_reads_ui_presentation_state
    status: active
    description: "Gameplay/domain systems must not read UI-only fields such as selected_item_id, hover state, card visuals, or drag preview state."
    why: "Gameplay must receive required player intent through typed payloads so presentation internals can change without breaking gameplay authority."
    adr: docs/architecture/adr-0006-presentation-to-gameplay-communication-pattern.md
    added: 2026-06-18

  - pattern: mvp_global_event_bus_for_ui_gameplay
    status: active
    description: "MVP presentation-to-gameplay communication must not use a global event bus as the default routing mechanism."
    why: "A global event bus hides ownership and event ordering before the MVP has a concrete need for that infrastructure."
    adr: docs/architecture/adr-0006-presentation-to-gameplay-communication-pattern.md
    added: 2026-06-18

  - pattern: duplicate_native_gui_and_gameplay_signal_action
    status: active
    description: "A single business action must not be bound both to a native Godot GUI signal and to a custom gameplay intent signal."
    why: "Duplicate bindings can fire the same player action twice, especially when standard Control paths and gameplay gesture paths overlap."
    adr: docs/architecture/adr-0006-presentation-to-gameplay-communication-pattern.md
    added: 2026-06-18

  - pattern: ui_reconstructs_unlock_delta
    status: active
    description: "WardrobeUI, ClothingUnlock, and other presentation systems must not compare progression or wardrobe data to infer newly unlocked item IDs."
    why: "Unlock deltas are authoritative only when emitted by ProgressManager after persistence succeeds; UI-side reconstruction can duplicate, replay, or desynchronize unlock feedback."
    adr: docs/architecture/adr-0008-progression-and-unlock-event-contract.md
    added: 2026-06-18

  - pattern: unlock_audio_without_confirmed_batch
    status: active
    description: "Audio feedback for progress.items_unlocked must not be requested unless ClothingUnlock has received a confirmed non-empty unlock batch."
    why: "Audio should follow committed unlock presentation only, not speculative progression polling or empty unlock days."
    adr: docs/architecture/adr-0008-progression-and-unlock-event-contract.md
    added: 2026-06-18

