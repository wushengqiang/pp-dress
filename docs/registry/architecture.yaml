# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - system: GameState BOOT entry
    status: active
    budget_ms: 10
    platform: Web
    adr: docs/architecture/adr-0001-autoload-order-and-boot-orchestration.md
    notes: "BOOT entry path must stay under 10ms, excluding WebAssembly compilation time."
    referenced_by:
      - docs/architecture/adr-0001-autoload-order-and-boot-orchestration.md
    added: 2026-06-18
    revised: ""

  - system: GameState transition coordination
    status: active
    budget_ms: 1
    platform: Web
    adr: docs/architecture/adr-0004-scene-transition-and-state-machine-contract.md
    notes: "Request validation, guard checks, context copy, and commit bookkeeping should stay under 1ms, excluding actual scene and resource loading."
    referenced_by:
      - docs/architecture/adr-0004-scene-transition-and-state-machine-contract.md
    added: 2026-06-18
    revised: ""

  - system: Presentation-to-gameplay intent handling
    status: active
    budget_ms: 0.5
    platform: Web
    adr: docs/architecture/adr-0006-presentation-to-gameplay-communication-pattern.md
    notes: "Typed intent/result signal dispatch and small payload handling should stay under 0.5ms per player intent, excluding renderer texture loading."
    referenced_by:
      - docs/architecture/adr-0006-presentation-to-gameplay-communication-pattern.md
    added: 2026-06-18
    revised: ""

