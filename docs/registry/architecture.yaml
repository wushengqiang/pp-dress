    adr: docs/architecture/adr-0002-persistence-ownership-and-save-rollback-strategy.md
    interface: "ProgressManager is the only normal caller of SaveManager.set_current_day(), mark_day_completed(), record_unlocks(), and replace_progress_fields()."
    referenced_by:
      - docs/architecture/adr-0002-persistence-ownership-and-save-rollback-strategy.md
    added: 2026-06-18
    revised: ""

  - contract: goodnight_progress_commit
    status: active
    pattern: direct_call
    producer: GameState
    consumers:
      - ProgressManager
      - SaveManager
    adr: docs/architecture/adr-0002-persistence-ownership-and-save-rollback-strategy.md
    interface: "GOODNIGHT completion calls SaveManager.set_scene_in_progress(false), then ProgressManager.advance_day(), which calls SaveManager.save()."
    referenced_by:
      - docs/architecture/adr-0002-persistence-ownership-and-save-rollback-strategy.md
    added: 2026-06-18
    revised: ""

  - contract: progress_events_after_persistence
    status: active
    pattern: signal
    producer: ProgressManager
    consumers:
