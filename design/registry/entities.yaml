# ─── FORMULAS ────────────────────────────────────────────────────────────────
# Named calculations with defined variables and output ranges.
# Register a formula when its output feeds into another system's input,
# or when another GDD references it by name.
#
# Required fields: name, status, source, referenced_by, variables[],
#   output_range[min, max], added
# Optional: expression (the actual formula), notes

formulas:
  - name: new_items
    status: active
    source: design/gdd/progress-management.md
    referenced_by:
      - design/gdd/clothing-unlock.md
      - design/gdd/wardrobe-database.md
    variables:
      - day
      - WardrobeDatabase.get_unlocked_items(day)
      - WardrobeDatabase.get_unlocked_items(day - 1)
    output_range: [0, 4]
    expression: "ids(WardrobeDatabase.get_unlocked_items(day)) - ids(WardrobeDatabase.get_unlocked_items(day - 1))"
    notes: "Output is an Array[String] of newly unlocked item IDs. 0-4 is the normal MVP range; empty arrays are valid."
    added: 2026-06-09
    revised: ""
  - name: visible_categories
    status: active
    source: design/gdd/progress-management.md
    referenced_by:
      - design/gdd/wardrobe-ui.md
      - design/gdd/clothing-unlock.md
    variables:
      - day
    output_range: [3, 6]
    expression: "day 1..3 -> top,bottom,shoes; day 4..5 -> top,bottom,shoes,accessory,hair; day 6..7 -> makeup,top,bottom,shoes,accessory,hair"
    notes: "Wardrobe UI still displays all six MVP categories; categories outside this output are shown as grey disabled labels."
    added: 2026-06-09
    revised: ""
  - name: is_day_available
    status: active
    source: design/gdd/progress-management.md
    referenced_by:
      - design/gdd/main-menu-goodnight-ui.md
      - design/gdd/scene-state-management.md
    variables:
      - day
      - highest_day_completed
      - TOTAL_DAYS
    output_range: [0, 1]
    expression: "(day >= 1) AND (day <= highest_day_completed + 1) AND (day <= TOTAL_DAYS)"
    notes: "Boolean output. Already completed days are replayable; day 8 is never available in MVP."
    added: 2026-06-09
    revised: ""

